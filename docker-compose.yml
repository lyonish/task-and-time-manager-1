services:
  mysql:
    image: mysql:8
    container_name: taskmanager-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: taskmanager
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: taskpassword
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    container_name: taskmanager-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Inside the container the DB is reachable via the service name, not localhost
      DATABASE_URL: mysql://taskuser:taskpassword@mysql:3306/taskmanager
      NEXTAUTH_URL: http://localhost:3000
      # Override via env var in production: NEXTAUTH_SECRET=<strong-secret> docker compose up
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-secret-change-in-production}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
